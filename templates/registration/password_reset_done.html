{% extends 'base.html' %}
{% block title %}Check Your Email - DriveEase{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center py-5">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card text-center">
                    <i class="bi bi-envelope-check-fill text-success" style="font-size:3.5rem;"></i>
                    <h3 class="fw-bold mt-3">Check Your Email</h3>
                    <p class="text-muted">
                        We've sent password reset instructions to your email address.
                        Please check your inbox and follow the link.
                    </p>
                    <a href="{% url 'users:login' %}" class="btn btn-danger mt-2">← Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
