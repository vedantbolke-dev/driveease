{% extends 'base.html' %}
{% block title %}Reset Password - DriveEase{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center py-5">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card text-center">
                    <i class="bi bi-lock-fill text-danger" style="font-size:3rem;"></i>
                    <h3 class="fw-bold mt-3">Reset Password</h3>
                    <p class="text-muted small mb-4">Enter your email address and we'll send you a reset link.</p>
                    <form method="POST" class="text-start">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-medium">Email Address</label>
                            <input type="email" name="email" class="form-control"
                                   placeholder="Enter your registered email" required>
                        </div>
                        <button type="submit" class="btn btn-danger w-100 py-2">
                            <i class="bi bi-envelope me-2"></i>Send Reset Link
                        </button>
                    </form>
                    <p class="text-muted small mt-3">
                        <a href="{% url 'users:login' %}" class="text-danger">← Back to Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
