{% extends 'base.html' %}
{% block title %}Password Reset Complete - DriveEase{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center py-5">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card text-center">
                    <i class="bi bi-check-circle-fill text-success" style="font-size:3.5rem;"></i>
                    <h3 class="fw-bold mt-3">Password Reset Successful!</h3>
                    <p class="text-muted">Your password has been changed. You can now login with your new password.</p>
                    <a href="{% url 'users:login' %}" class="btn btn-danger mt-2">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Login Now
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
