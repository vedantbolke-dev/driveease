{% extends 'base.html' %}
{% block title %}Set New Password - DriveEase{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="container">
        <div class="row justify-content-center min-vh-100 align-items-center py-5">
            <div class="col-lg-5 col-md-7">
                <div class="auth-card">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-danger" style="font-size:3rem;"></i>
                        <h3 class="fw-bold mt-2">Set New Password</h3>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-danger w-100 py-2 mt-2">
                            <i class="bi bi-check-circle me-2"></i>Set New Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
