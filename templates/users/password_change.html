{% extends 'base.html' %}
{% block title %}Change Password - DriveEase{% endblock %}
{% block main_class %}{% endblock %}

{% block content %}
<div style="margin-top:70px;">
<div class="page-header-section">
    <div class="container">
        <h1 class="page-header-title">Change Password</h1>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="{% url 'home' %}" class="text-danger">Home</a></li>
                <li class="breadcrumb-item"><a href="{% url 'users:profile' %}" class="text-danger">Profile</a></li>
                <li class="breadcrumb-item active">Change Password</li>
            </ol>
        </nav>
    </div>
</div>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="booking-form-card">
                <h5 class="fw-bold mb-4">
                    <i class="bi bi-shield-lock text-danger me-2"></i>Update Your Password
                </h5>

                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label fw-medium">Current Password <span class="text-danger">*</span></label>
                        <input type="password" name="old_password" class="form-control" placeholder="Enter current password" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">New Password <span class="text-danger">*</span></label>
                        <input type="password" name="new_password1" class="form-control" placeholder="Min 8 characters" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Confirm New Password <span class="text-danger">*</span></label>
                        <input type="password" name="new_password2" class="form-control" placeholder="Repeat new password" required>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-danger px-4 fw-bold">
                            <i class="bi bi-check-circle me-2"></i>Update Password
                        </button>
                        <a href="{% url 'users:profile' %}" class="btn btn-outline-dark px-4">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</div>
{% endblock %}
