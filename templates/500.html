{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>500 - Server Error | DriveEase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0d0d0d;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }
        .bg-glow {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,193,7,0.1) 0%, transparent 70%);
            pointer-events: none;
        }
        .error-container { text-align: center; position: relative; z-index: 1; padding: 40px 20px; }
        .error-number {
            font-size: 10rem; font-weight: 800; line-height: 1;
            background: linear-gradient(135deg, #ffc107, #ff8c00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .error-icon {
            font-size: 5rem; color: rgba(255,193,7,0.2);
            position: absolute; top: 10px; left: 50%;
            transform: translateX(-50%);
            animation: shake 2s ease-in-out infinite;
        }
        @keyframes shake {
            0%,100%{transform:translateX(-50%) rotate(0deg);}
            25%{transform:translateX(-50%) rotate(-5deg);}
            75%{transform:translateX(-50%) rotate(5deg);}
        }
        .error-title { font-size: 2rem; font-weight: 700; color: white; margin-top: 16px; }
        .error-desc { color: #888; font-size: 1rem; margin: 12px 0 32px; max-width: 420px; margin-left: auto; margin-right: auto; line-height: 1.7; }
        .btn-home {
            background: linear-gradient(135deg, #dc3545, #a71d2a); color: white; border: none;
            padding: 14px 36px; border-radius: 50px; font-weight: 700; font-size: 1rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 24px rgba(220,53,69,0.3);
        }
        .btn-home:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(220,53,69,0.4); color: white; }
        .btn-refresh {
            background: rgba(255,193,7,0.1); color: #ffc107;
            border: 1px solid rgba(255,193,7,0.3);
            padding: 14px 36px; border-radius: 50px; font-weight: 600; font-size: 1rem;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px;
            transition: all 0.2s; cursor: pointer;
        }
        .btn-refresh:hover { background: rgba(255,193,7,0.2); color: #ffc107; }
        .brand { position: fixed; top: 24px; left: 32px; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .brand span { font-size: 1.3rem; font-weight: 800; color: white; }
        .brand span em { color: #dc3545; font-style: normal; }
        .error-box { background: rgba(255,193,7,0.05); border: 1px solid rgba(255,193,7,0.2); border-radius: 12px; padding: 16px 24px; display: inline-block; margin-top: 8px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <a href="/" class="brand">
        <i class="bi bi-car-front-fill text-danger fs-4"></i>
        <span>Drive<em>Ease</em></span>
    </a>

    <div class="error-container">
        <div style="position:relative; display:inline-block;">
            <i class="bi bi-gear-wide-connected error-icon"></i>
            <div class="error-number">500</div>
        </div>
        <h1 class="error-title">Engine Trouble!</h1>
        <p class="error-desc">
            Something went wrong on our end. Our team has been notified
            and is working hard to fix the issue. Please try again in a moment.
        </p>
        <div class="error-box mb-4">
            <span style="color:#ffc107;font-size:0.88rem;"><i class="bi bi-exclamation-triangle me-2"></i>Internal Server Error — We're on it!</span>
        </div>
        <br>
        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="/" class="btn-home">
                <i class="bi bi-house-fill"></i> Go Back Home
            </a>
            <button onclick="location.reload()" class="btn-refresh">
                <i class="bi bi-arrow-clockwise"></i> Try Again
            </button>
        </div>
        <div style="margin-top:48px;display:flex;justify-content:center;gap:32px;flex-wrap:wrap;">
            <a href="/contact/" style="color:#666;text-decoration:none;font-size:0.88rem;"><i class="bi bi-envelope me-1"></i>Report Issue</a>
            <a href="/cars/" style="color:#666;text-decoration:none;font-size:0.88rem;"><i class="bi bi-car-front me-1"></i>Browse Cars</a>
        </div>
    </div>
</body>
</html>
